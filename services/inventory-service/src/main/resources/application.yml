server:
    port: ${INVENTORY_SERVICE_PORT:8083}

spring:
    application:
        name: inventory-service

    config:
        import: "optional:configserver:${CONFIG_SERVER_URL:http://localhost:8888}"

    datasource:
        url: ${INVENTORY_DB_URL:jdbc:mysql://localhost:3306/cinema_inventory_db?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC}
        username: ${INVENTORY_DB_USERNAME}
        password: ${INVENTORY_DB_PASSWORD}
        driver-class-name: com.mysql.cj.jdbc.Driver

    jpa:
        open-in-view: false
        hibernate:
            ddl-auto: validate
        properties:
            hibernate:
                format_sql: true
                jdbc:
                    time_zone: UTC

    flyway:
        enabled: true
        locations: classpath:db/migration
        validate-on-migrate: true

springdoc:
    api-docs:
        enabled: true
        path: /v3/api-docs

    swagger-ui:
        enabled: true
        path: /swagger-ui.html
        disable-swagger-default-url: true

eureka:
    client:
        service-url:
            defaultZone: ${EUREKA_URL:http://localhost:8761/eureka/}

    instance:
        prefer-ip-address: true
        instance-id: ${spring.application.name}:${server.port}

management:
    endpoints:
        web:
            exposure:
                include: health,info

    endpoint:
        health:
            show-details: always

logging:
    level:
        com.cinema.inventory: INFO
        com.netflix.discovery: INFO
        org.hibernate.SQL: DEBUG
