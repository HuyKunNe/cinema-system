server:
    port: ${CONFIG_SERVER_PORT:8888}

spring:
    application:
        name: config-service

    profiles:
        active: ${SPRING_PROFILES_ACTIVE:native}

    cloud:
        config:
            server:
                native:
                    search-locations:
                        - classpath:/config-repo

management:
    endpoints:
        web:
            exposure:
                include:
                    - health
                    - info
                    - metrics
                    - prometheus

    endpoint:
        health:
            show-details: when-authorized

    health:
        readinessstate:
            enabled: true
        livenessstate:
            enabled: true

    tracing:
        sampling:
            probability: ${TRACING_SAMPLING_PROBABILITY:1.0}

        export:
            otlp:
                enabled: ${OTEL_EXPORTER_ENABLED:false}

info:
    application:
        name: ${spring.application.name}
        description: Cinema centralized configuration server
        version: ${project.version:1.0.0-SNAPSHOT}

logging:
    pattern:
        correlation: >-
            [${spring.application.name:config-service},
            %X{traceId:-},
            %X{spanId:-}]
