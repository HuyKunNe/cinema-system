server:
    port: ${MOVIE_SERVICE_PORT:8081}

spring:
    datasource:
        url: >-
            ${MOVIE_DB_URL:jdbc:mysql://localhost:3306/cinema_movie_db?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC}

        username: ${MOVIE_DB_USERNAME:root}
        password: ${MOVIE_DB_PASSWORD:huykun17}

        hikari:
            pool-name: MovieServiceHikariPool
            minimum-idle: 2
            maximum-pool-size: 10
            connection-timeout: 30000
            idle-timeout: 600000
            max-lifetime: 1800000

    jpa:
        open-in-view: false

        hibernate:
            ddl-auto: validate

        properties:
            hibernate:
                format_sql: true
                jdbc:
                    time_zone: UTC

    flyway:
        enabled: true
        locations:
            - classpath:db/migration
        validate-on-migrate: true
        clean-disabled: true

eureka:
    client:
        register-with-eureka: true
        fetch-registry: true

        service-url:
            defaultZone: >-
                ${EUREKA_SERVER_URL:http://localhost:8761/eureka/}

        healthcheck:
            enabled: true

    instance:
        prefer-ip-address: true

        instance-id: >-
            ${spring.application.name}:${spring.application.instance_id:${random.value}}

management:
    endpoints:
        web:
            exposure:
                include:
                    - health
                    - info
                    - metrics
                    - prometheus

    endpoint:
        health:
            show-details: when-authorized

    health:
        readinessstate:
            enabled: true

        livenessstate:
            enabled: true

info:
    application:
        name: ${spring.application.name}
        description: Cinema movie catalog service
        version: ${APP_VERSION:1.0.0-SNAPSHOT}
