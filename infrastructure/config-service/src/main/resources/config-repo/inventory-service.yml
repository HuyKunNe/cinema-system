server:
    port: ${INVENTORY_SERVICE_PORT:8083}

spring:
    datasource:
        url: ${INVENTORY_DB_URL:jdbc:mysql://localhost:3306/cinema_inventory_db?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC}
        username: ${INVENTORY_DB_USERNAME}
        password: ${INVENTORY_DB_PASSWORD}
        driver-class-name: com.mysql.cj.jdbc.Driver

    jpa:
        open-in-view: false
        hibernate:
            ddl-auto: validate
        properties:
            hibernate:
                format_sql: true
                jdbc:
                    time_zone: UTC

    flyway:
        enabled: true
        locations: classpath:db/migration
        validate-on-migrate: true

eureka:
    client:
        service-url:
            defaultZone: ${EUREKA_URL:http://localhost:8761/eureka/}

    instance:
        prefer-ip-address: true
        instance-id: ${spring.application.name}:${server.port}

management:
    endpoints:
        web:
            exposure:
                include:
                    - health
                    - info
                    - metrics
                    - prometheus

    endpoint:
        health:
            show-details: when-authorized

    health:
        readinessstate:
            enabled: true
        livenessstate:
            enabled: true

    tracing:
        sampling:
            probability: ${TRACING_SAMPLING_PROBABILITY:1.0}

        export:
            otlp:
                enabled: ${OTEL_EXPORTER_ENABLED:false}

info:
    application:
        name: ${spring.application.name}
        description: Cinema inventory and seat availability service
        version: ${project.version:1.0.0-SNAPSHOT}
