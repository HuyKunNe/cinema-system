server:
    port: ${DISCOVERY_SERVICE_PORT:8761}

eureka:
    instance:
        hostname: ${EUREKA_HOSTNAME:localhost}

    client:
        register-with-eureka: false
        fetch-registry: false

        service-url:
            defaultZone: >-
                ${EUREKA_SERVER_URL:http://${eureka.instance.hostname}:${server.port}/eureka/}

    server:
        enable-self-preservation: ${EUREKA_SELF_PRESERVATION:true}

        eviction-interval-timer-in-ms: >-
            ${EUREKA_EVICTION_INTERVAL_MS:60000}

        response-cache-update-interval-ms: >-
            ${EUREKA_CACHE_UPDATE_INTERVAL_MS:30000}

management:
    endpoints:
        web:
            exposure:
                include:
                    - health
                    - info
                    - metrics
                    - prometheus

    endpoint:
        health:
            show-details: when-authorized

        env:
            show-values: never

    health:
        readinessstate:
            enabled: true

        livenessstate:
            enabled: true

    tracing:
        sampling:
            probability: ${TRACING_SAMPLING_PROBABILITY:1.0}

        export:
            otlp:
                enabled: ${OTEL_EXPORTER_ENABLED:false}

info:
    application:
        name: ${spring.application.name}
        description: Cinema Eureka Discovery Server
        version: ${APP_VERSION:1.0.0-SNAPSHOT}

logging:
    level:
        com.netflix.eureka: INFO
        com.netflix.discovery: INFO
