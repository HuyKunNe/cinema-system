server:
    port: ${GATEWAY_SERVICE_PORT:8080}

spring:
    cloud:
        gateway:
            server:
                webflux:
                    discovery:
                        locator:
                            enabled: true
                            lower-case-service-id: true

                    routes:
                        - id: movie-service
                          uri: lb://movie-service
                          predicates:
                              - Path=/api/v1/movies/**
                          filters:
                              - StripPrefix=0

                        - id: user-service
                          uri: lb://user-service
                          predicates:
                              - Path=/api/v1/users/**

                        - id: inventory-service
                          uri: lb://inventory-service
                          predicates:
                              - Path=/api/v1/inventory/**,/api/v1/showtimes/**,/api/v1/seats/**

                        - id: booking-service
                          uri: lb://booking-service
                          predicates:
                              - Path=/api/v1/bookings/**

                        - id: payment-service
                          uri: lb://payment-service
                          predicates:
                              - Path=/api/v1/payments/**

                        - id: notification-service
                          uri: lb://notification-service
                          predicates:
                              - Path=/api/v1/notifications/**

                    globalcors:
                        cors-configurations:
                            "[/**]":
                                allowed-origin-patterns:
                                    - ${CORS_ALLOWED_ORIGIN_PATTERN:http://localhost:*}
                                allowed-methods:
                                    - GET
                                    - POST
                                    - PUT
                                    - PATCH
                                    - DELETE
                                    - OPTIONS
                                allowed-headers:
                                    - Authorization
                                    - Content-Type
                                    - Accept
                                    - Origin
                                    - X-Requested-With
                                    - X-Request-Id
                                    - X-Correlation-Id
                                exposed-headers:
                                    - X-Request-Id
                                    - X-Correlation-Id
                                allow-credentials: true
                                max-age: 3600

                    httpclient:
                        connect-timeout: ${GATEWAY_CONNECT_TIMEOUT_MS:5000}

                        response-timeout: >-
                            ${GATEWAY_RESPONSE_TIMEOUT:10s}

eureka:
    client:
        register-with-eureka: true
        fetch-registry: true

        service-url:
            defaultZone: >-
                ${EUREKA_SERVER_URL:http://localhost:8761/eureka/}

        healthcheck:
            enabled: true

        registry-fetch-interval-seconds: 10

    instance:
        prefer-ip-address: true

        instance-id: >-
            ${spring.application.name}:${spring.application.instance_id:${random.value}}

        lease-renewal-interval-in-seconds: 10
        lease-expiration-duration-in-seconds: 30

management:
    endpoints:
        web:
            exposure:
                include:
                    - health
                    - info
                    - metrics
                    - prometheus
                    - gateway

    endpoint:
        health:
            show-details: when-authorized

        gateway:
            access: read-only

    health:
        readinessstate:
            enabled: true

        livenessstate:
            enabled: true

    tracing:
        sampling:
            probability: ${TRACING_SAMPLING_PROBABILITY:1.0}

        export:
            otlp:
                enabled: ${OTEL_EXPORTER_ENABLED:false}

info:
    application:
        name: ${spring.application.name}
        description: Cinema Booking System API Gateway
        version: ${APP_VERSION:1.0.0-SNAPSHOT}

logging:
    level:
        org.springframework.cloud.gateway: INFO
        org.springframework.cloud.loadbalancer: INFO
        com.netflix.discovery: INFO
