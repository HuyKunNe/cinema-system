server:
  port: 0

spring:
  application:
    name: discovery-service

  cloud:
    config:
      enabled: false

eureka:
  instance:
    hostname: localhost

  client:
    register-with-eureka: false
    fetch-registry: false

    service-url:
      defaultZone: http://localhost:8761/eureka/

  server:
    enable-self-preservation: false

management:
  tracing:
    enabled: false

  endpoints:
    web:
      exposure:
        include:
          - health
          - info
