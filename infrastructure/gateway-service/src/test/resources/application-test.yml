server:
    port: 0

spring:
    application:
        name: gateway-service

    cloud:
        config:
            enabled: false

        discovery:
            enabled: false

        gateway:
            server:
                webflux:
                    discovery:
                        locator:
                            enabled: false

                    routes: []

eureka:
    client:
        enabled: false
        register-with-eureka: false
        fetch-registry: false

management:
    tracing:
        enabled: false

    endpoints:
        web:
            exposure:
                include:
                    - health
                    - info
